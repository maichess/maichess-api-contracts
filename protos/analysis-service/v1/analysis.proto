syntax = "proto3";

package maichess.analysis.v1;

option csharp_namespace = "Maichess.Analysis.V1";
option java_multiple_files = true;
option java_package = "maichess.analysis.v1.analysis";

// The Analysis gRPC service has been removed.
//
// The Analysis service no longer exposes a gRPC endpoint. Engine analysis is
// now driven internally by the Analysis REST service in response to session
// control calls, and results are pushed to clients via the Socket service
// (Socket.EmitEvent). The Analysis WebSocket Service that previously consumed
// StreamPositionAnalysis has been abandoned.
//
// This file is retained to avoid a gap in the proto package version history.
// The generated stubs package should be bumped to reflect the removal.
