syntax = "proto3";

package maichess.database.v1;

import "google/protobuf/struct.proto";

option csharp_namespace = "Maichess.Database.V1";
option java_multiple_files = true;
option java_package = "maichess.database.v1.database";

// Database provides generic CRUD access for a single configured domain.
// All DB-specific query logic is encapsulated server-side; callers work
// entirely with structured key-value records.
//
// Two instances are deployed:
//   user-db   — PostgreSQL, serving User and Auth (Auth is read-only).
//   match-db  — MongoDB, serving Match Manager and Analysis.
service Database {
  // Get returns a single record by ID.
  // Returns NOT_FOUND if no record with the given ID exists.
  rpc Get(GetRequest) returns (GetResponse);

  // List returns records matching all fields in the filter.
  // Returns an empty list if no records match.
  rpc List(ListRequest) returns (ListResponse);

  // Count returns the number of records matching all fields in the filter.
  // Returns 0 if no records match. Omit filter to count all records in the collection.
  rpc Count(CountRequest) returns (CountResponse);

  // Insert creates a new record and returns it with its server-assigned ID.
  rpc Insert(InsertRequest) returns (InsertResponse);

  // Update applies partial field updates to an existing record by ID.
  // Only fields present in `fields` are modified; others are left unchanged.
  // Returns NOT_FOUND if no record with the given ID exists.
  rpc Update(UpdateRequest) returns (UpdateResponse);

  // Delete removes a record by ID.
  // Returns NOT_FOUND if no record with the given ID exists.
  rpc Delete(DeleteRequest) returns (DeleteResponse);

  // DeleteWhere removes all records in a collection matching the given filter.
  // An empty filter deletes every record in the collection.
  // Returns the number of deleted records.
  rpc DeleteWhere(DeleteWhereRequest) returns (DeleteWhereResponse);
}

message GetRequest {
  string collection = 1;
  string id = 2;
}

message GetResponse {
  google.protobuf.Struct record = 1;
}

// ListRequest retrieves records matching all specified filter fields (equality).
message ListRequest {
  string collection = 1;
  // Equality filters — all specified fields must match.
  // Omit to return all records in the collection.
  google.protobuf.Struct filter = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListResponse {
  repeated google.protobuf.Struct records = 1;
}

// CountRequest counts records matching all specified filter fields (equality).
message CountRequest {
  string collection = 1;
  // Equality filters — all specified fields must match.
  // Omit to count all records in the collection.
  google.protobuf.Struct filter = 2;
}

message CountResponse {
  int64 count = 1;
}

// InsertRequest adds a new record. Any `id` field in `record` is ignored;
// the server assigns a new ID and returns the full record including it.
message InsertRequest {
  string collection = 1;
  google.protobuf.Struct record = 2;
}

message InsertResponse {
  google.protobuf.Struct record = 1;
}

// UpdateRequest applies partial field updates by ID.
message UpdateRequest {
  string collection = 1;
  string id = 2;
  google.protobuf.Struct fields = 3;
}

message UpdateResponse {
  google.protobuf.Struct record = 1;
}

message DeleteRequest {
  string collection = 1;
  string id = 2;
}

message DeleteResponse {}

// DeleteWhereRequest removes all records matching the filter.
// An empty filter removes all records in the collection.
message DeleteWhereRequest {
  string collection = 1;
  // Equality filters — all specified fields must match.
  // Omit (or send empty Struct) to delete all records in the collection.
  google.protobuf.Struct filter = 2;
}

message DeleteWhereResponse {
  // Number of records that were deleted.
  int64 deleted_count = 1;
}
