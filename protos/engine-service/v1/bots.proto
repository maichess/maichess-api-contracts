syntax = "proto3";

package maichess.engine.v1;

option csharp_namespace = "Maichess.Engine.V1";
option java_multiple_files = true;
option java_package = "maichess.engine.v1";

// Bots provides chess engine move calculation.
// Called by: Match Manager
service Bots {
  // GetBestMove calculates the best move for the given position.
  rpc GetBestMove(GetBestMoveRequest) returns (GetBestMoveResponse);

  // ListBots returns all available bot identifiers and metadata.
  rpc ListBots(ListBotsRequest) returns (ListBotsResponse);
}

message GetBestMoveRequest {
  // Current board position in FEN notation.
  string fen = 1;
  // Which bot logic to use.
  string bot_id = 2;
}

message GetBestMoveResponse {
  // Chosen move in UCI notation (e.g. "e2e4", "e7e8q").
  string move = 1;
  // Position evaluation in centipawns from the moving side's perspective.
  int32 evaluation_cp = 2;
}

message Bot {
  string id = 1;
  string name = 2;
  // Approximate ELO strength.
  int32 elo = 3;
}

message ListBotsRequest {}

message ListBotsResponse {
  repeated Bot bots = 1;
}
