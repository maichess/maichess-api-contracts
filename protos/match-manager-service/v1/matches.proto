syntax = "proto3";

package maichess.match_manager.v1;

option csharp_namespace = "Maichess.MatchManager.V1";
option java_multiple_files = true;
option java_package = "maichess.match_manager.v1.matches";

// Matches instantiates and manages chess match state.
// CreateMatch is called by Match Maker; all other RPCs are used internally
// and reflected back to clients via the Match Manager REST API.
// Real-time events are pushed to clients by calling Socket.BroadcastMatchEvent
// on the socket service — see MatchEvent and its variants below for payload
// shapes.
service Matches {
  // CreateMatch is called by Match Maker once an opponent has been found.
  rpc CreateMatch(CreateMatchRequest) returns (CreateMatchResponse);

  // GetMatch returns the current state of a match.
  rpc GetMatch(GetMatchRequest) returns (GetMatchResponse);

  // ListMatches returns a paginated list of matches filtered by status and
  // optionally by time-format category. Used to power the Watch feature on
  // the client.
  rpc ListMatches(ListMatchesRequest) returns (ListMatchesResponse);

  // MakeMove applies a validated move to a match.
  rpc MakeMove(MakeMoveRequest) returns (MakeMoveResponse);

  // ResignMatch forfeits the match on behalf of a player.
  rpc ResignMatch(ResignMatchRequest) returns (ResignMatchResponse);

  // GetMatchPosition returns the board state at a specific point in the move
  // history. Available for matches where at least one side is a bot, and for
  // any match that has ended. Used to power the analysis navigation UI.
  rpc GetMatchPosition(GetMatchPositionRequest) returns (GetMatchPositionResponse);
}

// Player represents either a human user or a bot on one side of the board.
message Player {
  oneof identity {
    string user_id = 1;
    string bot_id = 2;
  }
}

// TimeFormat describes the clock rules for a match. The canonical list of
// supported presets is served by Match Maker via GET /time-formats; matches
// always embed the resolved format so consumers don't need to look it up.
message TimeFormat {
  // Canonical preset identifier, e.g. "3+0", "3+2", "5+0", "10+5".
  string id = 1;
  // Base clock allocated to each side at the start of the match.
  int64 base_ms = 2;
  // Increment added to the mover's clock after every move they make.
  int64 increment_ms = 3;
  // Coarse bucket: "bullet" | "blitz" | "rapid" | "classical".
  string category = 4;
}

enum MatchStatus {
  MATCH_STATUS_UNSPECIFIED = 0;
  MATCH_STATUS_ONGOING = 1;
  MATCH_STATUS_WHITE_WON = 2;
  MATCH_STATUS_BLACK_WON = 3;
  MATCH_STATUS_DRAW = 4;
}

enum EndReason {
  END_REASON_UNSPECIFIED = 0;
  END_REASON_CHECKMATE = 1;
  END_REASON_RESIGNATION = 2;
  END_REASON_STALEMATE = 3;
  END_REASON_TIMEOUT = 4;
  END_REASON_DRAW_AGREEMENT = 5;
  END_REASON_FIFTY_MOVE_RULE = 6;
  END_REASON_THREEFOLD_REPETITION = 7;
  END_REASON_INSUFFICIENT_MATERIAL = 8;
}

message Match {
  string id = 1;
  Player white = 2;
  Player black = 3;
  // Current board position in FEN notation.
  string current_fen = 4;
  MatchStatus status = 5;
  // Full move history in UCI notation, oldest first.
  repeated string moves = 6;
  TimeFormat time_format = 7;
  // Remaining clock time in milliseconds for each side.
  int64 white_time_ms = 8;
  int64 black_time_ms = 9;
}

message CreateMatchRequest {
  Player white = 1;
  Player black = 2;
  TimeFormat time_format = 3;
}

message CreateMatchResponse {
  Match match = 1;
}

message GetMatchRequest {
  string match_id = 1;
}

message GetMatchResponse {
  Match match = 1;
}

// ListMatches filter — covers ongoing-only listing today; the enum leaves
// room for ENDED or ALL filters in future revisions without breaking callers.
enum MatchStatusFilter {
  MATCH_STATUS_FILTER_UNSPECIFIED = 0;
  MATCH_STATUS_FILTER_ONGOING = 1;
}

message ListMatchesRequest {
  MatchStatusFilter status = 1;
  // Optional category filter ("bullet" | "blitz" | "rapid" | "classical").
  // Empty string means no filter.
  string category = 2;
  // 1-based page number; 0 is treated as 1.
  int32 page = 3;
  // Defaults to 20 when 0; capped at 100.
  int32 page_size = 4;
}

message ListMatchesResponse {
  repeated Match matches = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message MakeMoveRequest {
  string match_id = 1;
  string user_id = 2;
  // Move in UCI notation.
  string move = 3;
}

message MakeMoveResponse {
  Match match = 1;
}

message ResignMatchRequest {
  string match_id = 1;
  string user_id = 2;
}

message ResignMatchResponse {
  Match match = 1;
}

// MatchEvent and its variants define the payload shapes Match Manager sends to
// clients via Socket.BroadcastMatchEvent. The event name maps to each oneof
// field name (e.g. "move_made", "match_ended", "draw_offered", "draw_declined").
message MatchEvent {
  oneof event {
    MoveMadeEvent move_made = 1;
    MatchEndedEvent match_ended = 2;
    DrawOfferedEvent draw_offered = 3;
    DrawDeclinedEvent draw_declined = 4;
  }
}

message MoveMadeEvent {
  string move = 1;
  string resulting_fen = 2;
  Player player = 3;
  int64 white_time_ms = 4;
  int64 black_time_ms = 5;
  // Move index in the match history; use with GetMatchPosition for analysis navigation.
  int32 index = 6;
}

message MatchEndedEvent {
  MatchStatus status = 1;
  EndReason reason = 2;
}

message DrawOfferedEvent {
  // The player who made the offer.
  Player player = 1;
}

message DrawDeclinedEvent {
  // The player who declined or retracted the offer.
  Player player = 1;
}

message GetMatchPositionRequest {
  string match_id = 1;
  // 0 = starting position; N = position after the N-th move.
  int32 index = 2;
}

message GetMatchPositionResponse {
  int32 index = 1;
  // Board state in FEN notation at this index.
  string fen = 2;
  // The move that was played to reach this position (UCI notation).
  // Empty when index is 0.
  string move = 3;
  // True when this index equals the current live game position.
  bool is_current = 4;
}
