syntax = "proto3";

package socket.v1;

import "google/protobuf/struct.proto";

service Socket {
  // Called by other services to push a WebSocket event to a single connected
  // user across all of their open sockets.
  rpc EmitEvent(EmitEventRequest) returns (EmitEventResponse);

  // Called by Match Manager to push a WebSocket event to every client that has
  // subscribed to a given match room (participants and spectators alike). The
  // socket service joins / leaves connections to "match:<match_id>" rooms when
  // it receives `subscribe_match` / `unsubscribe_match` client events; see
  // api-contracts/rest/socket.md for the client-facing protocol.
  rpc BroadcastMatchEvent(BroadcastMatchEventRequest) returns (BroadcastMatchEventResponse);
}

message EmitEventRequest {
  string user_id = 1;
  string event   = 2;
  google.protobuf.Struct payload = 3;
}

message EmitEventResponse {
  // true if the target user had an active connection and the event was sent.
  bool delivered = 1;
}

message BroadcastMatchEventRequest {
  string match_id = 1;
  string event    = 2;
  google.protobuf.Struct payload = 3;
}

message BroadcastMatchEventResponse {
  // Number of socket connections that received the event.
  int32 recipients = 1;
}
